<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0">
  <meta name="description" content="OKF MD Master — Device scan and file management for mobile users">
  <meta property="og:title" content="OKF MD Master for Mobile">
  <meta property="og:description" content="Scan devices from your phone — convert everything to .md">
  <title>OKF MD · Client</title>
  <link rel="icon" href="/icon.svg">
  <style>
    :root { --bg:#0a0e17; --card:#0f172a; --border:#1e293b; --text:#e2e8f0; --dim:#64748b; --accent:#38bdf8; --green:#10b981; --red:#ef4444; --amber:#f59e0b; }
    * { box-sizing:border-box; margin:0; padding:0 }
    body { background:var(--bg); color:var(--text); font-family:system-ui; min-height:100dvh; overflow-x:hidden }
    .topbar { background:var(--card); border-bottom:1px solid var(--border); padding:8px 16px; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:10 }
    .topbar .logo { font-weight:700; font-size:15px; color:var(--accent) }
    .topbar .user { display:flex; align-items:center; gap:8px }
    .topbar img { width:28px; height:28px; border-radius:50% }
    .topbar .logout-btn { background:none; border:1px solid var(--border); color:var(--dim); padding:4px 12px; border-radius:6px; cursor:pointer; font-size:12px }
    .tabbar { display:flex; gap:1px; background:var(--border); border-bottom:1px solid var(--border); position:sticky; top:44px; z-index:9 }
    .tabbar button { flex:1; background:var(--card); color:var(--dim); border:none; padding:10px; font-size:12px; cursor:pointer; transition:.2s }
    .tabbar button.active { background:var(--bg); color:var(--accent); box-shadow:inset 0 -2px 0 var(--accent) }
    .content { max-width:720px; margin:0 auto; padding:16px }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:16px; margin-bottom:12px }
    .card h3 { font-size:14px; margin-bottom:8px; color:var(--text) }
    .card p { color:var(--dim); font-size:12px; line-height:1.5 }
    .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:10px }
    .grid .item { background:var(--bg); border:1px solid var(--border); border-radius:10px; padding:12px; text-align:center }
    .grid .item .icon { font-size:24px; margin-bottom:6px }
    .grid .item .name { font-size:11px; color:var(--text); word-break:break-all }
    .grid .item .date { font-size:10px; color:var(--dim); margin-top:4px }
    .journal-entry { padding:10px 0; border-bottom:1px solid var(--border); display:flex; gap:10px; align-items:flex-start }
    .journal-entry:last-child { border-bottom:none }
    .journal-entry .dot { width:8px; height:8px; border-radius:50%; margin-top:4px; flex-shrink:0 }
    .journal-entry .dot.approved { background:var(--green) }
    .journal-entry .dot.rejected { background:var(--red) }
    .journal-entry .dot.info { background:var(--accent) }
    .journal-entry .meta { flex:1; min-width:0 }
    .journal-entry .what { font-size:12px }
    .journal-entry .when { font-size:10px; color:var(--dim); margin-top:2px }
    .journal-entry .detail { font-size:11px; color:var(--dim); margin-top:3px }
    .empty-state { text-align:center; padding:40px 16px }
    .empty-state .big-icon { font-size:40px; margin-bottom:12px }
    .badge { display:inline-block; font-size:10px; padding:2px 8px; border-radius:10px; font-weight:600 }
    .badge.pending { background:#451a03; color:var(--amber) }
    .badge.active { background:#052e16; color:var(--green) }
    .upload-btn { display:block; width:100%; background:var(--accent); color:#0a0e17; border:none; padding:12px; border-radius:8px; font-weight:700; font-size:14px; cursor:pointer; margin-bottom:16px }
    .upload-btn:hover { opacity:.9 }
    #file-input { display:none }
    .status-banner { background:#451a03; border:1px solid var(--amber); border-radius:8px; padding:10px 14px; margin-bottom:12px; font-size:12px; color:var(--amber); text-align:center }
    .stat-box { text-align:center }
    .stat-box .num { font-size:28px; font-weight:700 }
    .stat-box .num.green { color:var(--green) }
    .stat-box .num.blue { color:var(--accent) }
    .stat-box .label { font-size:11px; color:var(--dim); margin-top:2px }
    @media(max-width:480px){.grid{grid-template-columns:repeat(2,1fr)}}
  </style>
</head>
<body>
  <div class="topbar">
    <span class="logo">OKF MD Client</span>
    <div class="user">
      <img id="avatar" alt="avatar">
      <span style="font-size:12px;color:var(--dim)" id="uname"></span>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
  </div>
  <div class="tabbar">
    <button class="active" onclick="switchTab('library',this)">Library</button>
    <button onclick="switchTab('journal',this)">Upload History</button>
    <button onclick="switchTab('chat',this)">Chat</button>
  </div>

  <div class="content" id="tab-library">
    <input type="file" id="file-input" accept=".md,.txt,.json,.csv,.yaml,.yml" onchange="handleUpload(this)" multiple>
    <button class="upload-btn" onclick="document.getElementById('file-input').click()">+ Upload .md / .json / .csv</button>
    <div id="status-banner" class="status-banner" style="display:none"></div>
    <div style="display:flex;gap:12px;margin-bottom:16px">
      <div class="card stat-box" style="flex:1"><div class="num green" id="approved-count">0</div><div class="label">Approved</div></div>
      <div class="card stat-box" style="flex:1"><div class="num blue" id="pending-count">0</div><div class="label">Pending</div></div>
    </div>
    <div class="card">
      <h3>Your Files</h3>
      <div class="grid" id="file-grid"><div class="empty-state"><div class="big-icon">📭</div><p>No approved files yet. Upload above.</p></div></div>
    </div>
  </div>

  <div class="content" id="tab-journal" style="display:none">
    <h3 style="margin-bottom:8px">Upload History</h3>
    <p style="color:var(--dim);font-size:12px;margin-bottom:16px">All your uploads and their approval status</p>
    <div id="journal-list"></div>
  </div>

  <div class="content" id="tab-chat" style="display:none">
    <div class="card" style="min-height:300px;display:flex;align-items:center;justify-content:center;flex-direction:column">
      <div class="big-icon">💬</div>
      <p>Chat support coming soon.</p>
      <p style="color:var(--dim);font-size:11px;margin-top:4px">Contact: Jenspacito+OKF@gmail.com</p>
    </div>
  </div>

  <script>
    let userEmail = '';
    async function init() {
      try {
        const r = await fetch('/api/user');
        if (!r.ok) return window.location = '/login';
        const user = await r.json();
        userEmail = user.email;
        document.getElementById('uname').textContent = user.name || user.email;
        document.getElementById('avatar').src = user.picture || '/icon.svg';
        loadLibrary();
        loadJournal();
      } catch { window.location = '/login'; }
    }

    async function loadLibrary() {
      try {
        const r = await fetch('/api/files');
        const files = await r.json();
        if (files.length === 0) {
          document.getElementById('file-grid').innerHTML = '<div class="empty-state"><div class="big-icon">📭</div><p>No approved files yet. Upload above.</p></div>';
          document.getElementById('approved-count').textContent = '0';
        } else {
          document.getElementById('approved-count').textContent = files.length;
          document.getElementById('file-grid').innerHTML = files.map(f => `<div class="item"><div class="icon">📄</div><div class="name">${esc(f.name)}</div><div class="date">${new Date(f.uploaded||'').toLocaleDateString()}</div></div>`).join('');
        }
      } catch { document.getElementById('file-grid').innerHTML = '<p style="color:var(--dim);font-size:12px">Could not load files.</p>'; }
    }

    async function loadJournal() {
      try {
        const r = await fetch('/api/client/journal', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: '{}' });
        const entries = await r.json();
        document.getElementById('pending-count').textContent = entries.filter(e => e.action === 'uploaded').length;
        if (!entries.length) {
          document.getElementById('journal-list').innerHTML = '<div class="empty-state"><div class="big-icon">📋</div><p>No upload history yet.</p></div>';
        } else {
          document.getElementById('journal-list').innerHTML = entries.slice().reverse().map(e => `
            <div class="journal-entry">
              <div class="dot ${e.action==='approved'?'approved':e.action==='rejected'?'rejected':'info'}"></div>
              <div class="meta">
                <div class="what">${esc(e.filename)} — ${e.action}</div>
                <div class="when">${new Date(e.at).toLocaleString()}</div>
                ${e.detail ? `<div class="detail">${esc(e.detail)}</div>` : ''}
              </div>
            </div>`).join('');
        }
      } catch { document.getElementById('journal-list').innerHTML = '<p style="color:var(--dim);font-size:12px">Could not load history.</p>'; }
    }

    async function handleUpload(input) {
      const files = input.files;
      if (!files.length) return;
      const banner = document.getElementById('status-banner');
      for (const file of files) {
        if (file.size > 500000) {
          banner.style.display = 'block';
          banner.textContent = `❌ ${file.name}: Zu gross (max 500 KB)`;
          continue;
        }
        const form = new FormData(); form.append('file', file);
        try {
          const r = await fetch('/upload', { method: 'POST', body: form });
          const j = await r.json();
          banner.style.display = 'block';
          banner.textContent = j.pending ? `⏳ ${file.name}: Submitted — awaiting admin approval` : `✅ ${file.name}: ${j.message || 'Uploaded'}`;
          if (j.pending) banner.style.background = '#451a03';
          else banner.style.background = '#052e16';
        } catch {
          banner.style.display = 'block';
          banner.textContent = `❌ ${file.name}: Upload failed`;
        }
      }
      input.value = '';
      setTimeout(() => { banner.style.display = 'none'; loadJournal(); }, 3000);
    }

    function switchTab(id, btn) {
      ['library','journal','chat'].forEach(t => document.getElementById('tab-'+t).style.display = t===id?'block':'none');
      document.querySelectorAll('.tabbar button').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      if (id === 'journal') loadJournal();
    }

    function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function logout() { document.cookie = 'okf_session=;max-age=0;path=/'; window.location = '/login'; }
    init();
  </script>
</body>
</html>
